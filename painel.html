<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Painel Admin | Red Studio</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#CC0000;--red2:#E02020;
  --bg:#080808;--bg2:#0f0f0f;--bg3:#141414;--bg4:#1a1a1a;
  --text:#F0F0F0;--text2:#888;--text3:#444;
  --border:#1c1c1c;--border2:#252525;
  --r:6px;
  --gold:#F59E0B;--green:#22c55e;--orange:#f97316;
}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--red);border-radius:2px}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:40px 36px;width:100%;max-width:360px;text-align:center}
.login-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px}
.login-logo-circle{width:40px;height:40px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:900;color:#fff}
.login-logo-text{font-size:1rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em}
.login-logo-text .accent{color:var(--red)}
.login-card h2{font-size:1.1rem;font-weight:700;margin-bottom:6px}
.login-card p{font-size:.82rem;color:var(--text2);margin-bottom:24px}
.login-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:12px 14px;font-size:.9rem;color:var(--text);outline:none;font-family:inherit;text-align:center;letter-spacing:.1em;margin-bottom:12px}
.login-input:focus{border-color:var(--red)}
.login-btn{width:100%;background:var(--red);color:#fff;font-size:.9rem;font-weight:700;padding:13px;border-radius:var(--r);border:none;cursor:pointer;transition:background .2s}
.login-btn:hover{background:var(--red2)}
.login-err{font-size:.78rem;color:var(--red);margin-top:8px;min-height:16px}

/* MAIN LAYOUT */
#app{display:none;flex-direction:column;min-height:100vh}
#app.visible{display:flex}

/* TOPBAR */
#topbar{background:var(--bg2);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:100}
.topbar-logo{display:flex;align-items:center;gap:8px;margin-right:auto}
.topbar-logo-circle{width:28px;height:28px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:900;color:#fff;flex-shrink:0}
.topbar-logo-text{font-size:.8rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--text)}
.topbar-logo-text .accent{color:var(--red)}
.topbar-badge{font-size:.65rem;padding:3px 8px;border-radius:2px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
.topbar-badge.admin{background:rgba(204,0,0,.15);color:var(--red);border:1px solid rgba(204,0,0,.2)}
.topbar-refresh{display:flex;align-items:center;gap:6px;font-size:.75rem;color:var(--text3);background:none;border:none;cursor:pointer;transition:color .2s;padding:6px 10px;border-radius:var(--r)}
.topbar-refresh:hover{color:var(--text);background:var(--bg3)}
.topbar-refresh svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.topbar-refresh.spinning svg{animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.topbar-new{font-size:.75rem;background:var(--red);color:#fff;border:none;padding:6px 12px;border-radius:var(--r);cursor:pointer;font-weight:700;transition:background .2s}
.topbar-new:hover{background:var(--red2)}

/* STATS */
#stats-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;gap:20px;overflow-x:auto}
.stat{display:flex;flex-direction:column;gap:2px;min-width:80px}
.stat-val{font-size:1.3rem;font-weight:900;letter-spacing:-.04em}
.stat-label{font-size:.64rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);white-space:nowrap}
.stat-val.red{color:var(--red)}
.stat-val.green{color:var(--green)}
.stat-val.gold{color:var(--gold)}

/* FILTER BAR */
#filter-bar{padding:12px 20px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--bg)}
.filter-btn{padding:6px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);font-size:.75rem;color:var(--text3);cursor:pointer;transition:all .2s;white-space:nowrap}
.filter-btn:hover{color:var(--text);border-color:var(--text3)}
.filter-btn.active{border-color:var(--red);color:var(--red);background:rgba(204,0,0,.08);font-weight:700}
.search-input{flex:1;min-width:160px;background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:6px 14px;font-size:.8rem;color:var(--text);outline:none;font-family:inherit}
.search-input:focus{border-color:rgba(204,0,0,.4)}
.search-input::placeholder{color:var(--text3)}

/* BOOKINGS TABLE */
#main-content{flex:1;padding:16px 20px}
#empty-state{display:none;text-align:center;padding:80px 20px;color:var(--text3)}
#empty-state svg{width:40px;height:40px;stroke:var(--text3);fill:none;stroke-width:1.5;margin-bottom:16px}
#empty-state p{font-size:.9rem;margin-bottom:4px}
#empty-state small{font-size:.78rem}

/* BOOKING CARD */
.booking-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.booking-card:hover{border-color:var(--border2)}
.booking-card.status-confirmado{border-left:3px solid var(--green)}
.booking-card.status-cancelado{border-left:3px solid var(--text3);opacity:.55}
.booking-card.status-pendente{border-left:3px solid var(--gold)}
.bc-head{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer}
.bc-status{padding:3px 8px;border-radius:2px;font-size:.62rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;flex-shrink:0}
.bc-status.pendente{background:rgba(245,158,11,.12);color:var(--gold);border:1px solid rgba(245,158,11,.25)}
.bc-status.confirmado{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.bc-status.cancelado{background:rgba(100,100,100,.1);color:var(--text3);border:1px solid var(--border2)}
.bc-name{font-size:.95rem;font-weight:700;flex:1}
.bc-date{font-size:.78rem;color:var(--text2);white-space:nowrap}
.bc-phone{font-size:.78rem;color:var(--text3);white-space:nowrap}
.bc-arrow{flex-shrink:0;transition:transform .25s}
.bc-arrow svg{width:14px;height:14px;stroke:var(--text3);fill:none;stroke-width:2}
.booking-card.open .bc-arrow{transform:rotate(180deg)}
.bc-body{display:none;border-top:1px solid var(--border);padding:16px;background:var(--bg3)}
.booking-card.open .bc-body{display:block}
.bc-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.bc-field{flex:1;min-width:140px}
.bc-field label{display:block;font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:5px}
.bc-input{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:4px;padding:8px 10px;font-size:.82rem;color:var(--text);outline:none;font-family:inherit}
.bc-input:focus{border-color:var(--red);box-shadow:0 0 0 2px rgba(204,0,0,.1)}
.bc-select{appearance:none;cursor:pointer}
.bc-services-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.bc-chip{padding:4px 10px;border-radius:20px;font-size:.72rem;background:rgba(204,0,0,.1);border:1px solid rgba(204,0,0,.2);color:var(--red)}
.bc-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.bc-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r);border:1px solid;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.bc-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.bc-btn.save{background:var(--red);color:#fff;border-color:var(--red)}
.bc-btn.save:hover{background:var(--red2);border-color:var(--red2)}
.bc-btn.wa{background:rgba(37,211,102,.1);color:#25D366;border-color:rgba(37,211,102,.25)}
.bc-btn.wa:hover{background:rgba(37,211,102,.2)}
.bc-btn.confirm{background:rgba(34,197,94,.1);color:var(--green);border-color:rgba(34,197,94,.2)}
.bc-btn.confirm:hover{background:rgba(34,197,94,.2)}
.bc-btn.cancel{background:rgba(100,100,100,.08);color:var(--text2);border-color:var(--border2)}
.bc-btn.cancel:hover{background:rgba(204,0,0,.08);color:var(--red);border-color:rgba(204,0,0,.2)}
.bc-btn.del{background:transparent;color:var(--text3);border-color:var(--border)}
.bc-btn.del:hover{color:var(--red);border-color:rgba(204,0,0,.3)}
.bc-meta{font-size:.7rem;color:var(--text3);margin-top:10px}

/* SPINNER */
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);z-index:2000;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:10px 18px;font-size:.82rem;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:rgba(34,197,94,.3);color:var(--green)}
#toast.err{border-color:rgba(204,0,0,.3);color:var(--red)}

/* LOADING OVERLAY */
#loading{display:none;position:fixed;inset:0;background:rgba(8,8,8,.8);z-index:500;align-items:center;justify-content:center}
#loading.show{display:flex}
.big-spinner{width:32px;height:32px;border:3px solid rgba(204,0,0,.2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}

@media(max-width:600px){.bc-row{flex-direction:column}.bc-actions{flex-direction:column}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-circle">RS</div>
      <div class="login-logo-text">Red <span class="accent">Studio</span></div>
    </div>
    <h2>Painel Administrativo</h2>
    <p>Insira o token de acesso para continuar</p>
    <input type="password" class="login-input" id="token-input" placeholder="••••••••" autocomplete="off">
    <button class="login-btn" id="login-btn" type="button">Entrar</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div id="topbar">
    <div class="topbar-logo">
      <div class="topbar-logo-circle">RS</div>
      <div class="topbar-logo-text">Red <span class="accent">Studio</span></div>
    </div>
    <span class="topbar-badge admin">Admin</span>
    <button class="topbar-refresh" id="refresh-btn" type="button">
      <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
      Atualizar
    </button>
    <a href="/agendar" target="_blank" class="topbar-new">+ Novo agendamento</a>
  </div>

  <div id="stats-bar">
    <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-label">Total</div></div>
    <div class="stat"><div class="stat-val gold" id="s-pendente">0</div><div class="stat-label">Pendentes</div></div>
    <div class="stat"><div class="stat-val green" id="s-confirmado">0</div><div class="stat-label">Confirmados</div></div>
    <div class="stat"><div class="stat-val red" id="s-cancelado">0</div><div class="stat-label">Cancelados</div></div>
    <div class="stat"><div class="stat-val" id="s-today">0</div><div class="stat-label">Hoje</div></div>
  </div>

  <div id="filter-bar">
    <button class="filter-btn active" data-filter="todos" type="button">Todos</button>
    <button class="filter-btn" data-filter="pendente" type="button">Pendentes</button>
    <button class="filter-btn" data-filter="confirmado" type="button">Confirmados</button>
    <button class="filter-btn" data-filter="cancelado" type="button">Cancelados</button>
    <input class="search-input" id="search-input" type="text" placeholder="Buscar por nome, veiculo...">
  </div>

  <div id="main-content">
    <div id="empty-state">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <p>Nenhum agendamento encontrado</p>
      <small>Os agendamentos aparecem aqui quando alguem usa o formulario</small>
    </div>
    <div id="bookings-list"></div>
  </div>
</div>

<div id="toast"></div>
<div id="loading"><div class="big-spinner"></div></div>

<script>
(function(){
'use strict';

var TOKEN_KEY = 'rs_admin_token';
var adminToken = '';
var allBookings = [];
var currentFilter = 'todos';
var searchQuery = '';
var autoRefreshTimer = null;

var SVC_LIST = [
  'Limpeza Interna','Limpeza Externa','Higienizacao de Bancos',
  'Higienizacao Completa','Polimento Tecnico','Limpeza do Motor',
  'Cera e Protecao','Revitalizacao de Plasticos','Cristalizacao de Vidros','Micro Pintura'
];

/* TOAST */
function toast(msg, type){
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + (type||'ok');
  setTimeout(function(){ el.className=''; }, 3000);
}

/* LOADING */
function setLoading(on){
  document.getElementById('loading').className = on ? 'show' : '';
}

/* LOGIN */
var savedToken = '';
try{ savedToken = sessionStorage.getItem(TOKEN_KEY) || ''; }catch(e){}
if(savedToken){
  adminToken = savedToken;
  showApp();
}

document.getElementById('token-input').addEventListener('keydown', function(e){
  if(e.key==='Enter') document.getElementById('login-btn').click();
});

document.getElementById('login-btn').addEventListener('click', function(){
  var val = document.getElementById('token-input').value.trim();
  if(!val){ document.getElementById('login-err').textContent = 'Informe o token.'; return; }
  adminToken = val;
  setLoading(true);
  fetchBookings().then(function(){
    try{ sessionStorage.setItem(TOKEN_KEY, val); }catch(e){}
    showApp();
  }).catch(function(err){
    setLoading(false);
    adminToken = '';
    document.getElementById('login-err').textContent = err.message === '401' ? 'Token invalido.' : 'Erro de conexao.';
  });
});

function showApp(){
  document.getElementById('login-screen').style.display = 'none';
  var app = document.getElementById('app');
  app.className = 'visible';
  if(!allBookings.length) fetchBookings().then(renderAll).catch(function(){ toast('Erro ao carregar agendamentos.','err'); });
  else renderAll();
  startAutoRefresh();
}

/* FETCH */
function fetchBookings(){
  return fetch('/api/bookings', {
    headers: {'x-admin-token': adminToken}
  }).then(function(r){
    if(r.status === 401) throw new Error('401');
    if(!r.ok) throw new Error('server');
    return r.json();
  }).then(function(data){
    allBookings = Array.isArray(data) ? data : [];
    allBookings.sort(function(a,b){ return (b.createdAt||'').localeCompare(a.createdAt||''); });
    setLoading(false);
    return allBookings;
  });
}

function startAutoRefresh(){
  if(autoRefreshTimer) clearInterval(autoRefreshTimer);
  autoRefreshTimer = setInterval(function(){
    fetchBookings().then(renderAll).catch(function(){});
  }, 30000);
}

document.getElementById('refresh-btn').addEventListener('click', function(){
  var btn = this;
  btn.classList.add('spinning');
  fetchBookings().then(function(){
    renderAll();
    btn.classList.remove('spinning');
    toast('Atualizado!','ok');
  }).catch(function(){
    btn.classList.remove('spinning');
    toast('Erro ao atualizar.','err');
  });
});

/* FILTER & SEARCH */
document.getElementById('filter-bar').addEventListener('click', function(e){
  var btn = e.target.closest('.filter-btn');
  if(!btn) return;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  renderAll();
});

document.getElementById('search-input').addEventListener('input', function(){
  searchQuery = this.value.toLowerCase().trim();
  renderAll();
});

/* STATS */
function updateStats(){
  var total = allBookings.length;
  var pendente = allBookings.filter(function(b){ return b.status==='pendente'; }).length;
  var confirmado = allBookings.filter(function(b){ return b.status==='confirmado'; }).length;
  var cancelado = allBookings.filter(function(b){ return b.status==='cancelado'; }).length;
  var today = new Date().toISOString().slice(0,10);
  var todayCount = allBookings.filter(function(b){ return (b.date||'')===today || (b.createdAt||'').startsWith(today); }).length;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-pendente').textContent = pendente;
  document.getElementById('s-confirmado').textContent = confirmado;
  document.getElementById('s-cancelado').textContent = cancelado;
  document.getElementById('s-today').textContent = todayCount;
}

/* RENDER */
function filteredBookings(){
  return allBookings.filter(function(b){
    if(currentFilter !== 'todos' && b.status !== currentFilter) return false;
    if(searchQuery){
      var hay = ((b.name||'') + ' ' + (b.vehicle||'') + ' ' + (b.phone||'')).toLowerCase();
      if(!hay.includes(searchQuery)) return false;
    }
    return true;
  });
}

function renderAll(){
  updateStats();
  var list = document.getElementById('bookings-list');
  var empty = document.getElementById('empty-state');
  var filtered = filteredBookings();
  while(list.firstChild) list.removeChild(list.firstChild);
  if(!filtered.length){
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  filtered.forEach(function(b){ list.appendChild(buildCard(b)); });
}

/* BUILD CARD */
function buildCard(b){
  var card = document.createElement('div');
  card.className = 'booking-card status-' + (b.status||'pendente');
  card.dataset.id = b.id;

  var dateStr = b.date ? b.date.split('-').reverse().join('/') : 'Data nao definida';
  var timeStr = b.time ? ' as ' + b.time : '';

  /* HEAD */
  var head = document.createElement('div');
  head.className = 'bc-head';

  var statusBadge = document.createElement('span');
  statusBadge.className = 'bc-status ' + (b.status||'pendente');
  statusBadge.textContent = (b.status||'pendente').charAt(0).toUpperCase() + (b.status||'pendente').slice(1);
  head.appendChild(statusBadge);

  var nameEl = document.createElement('div');
  nameEl.className = 'bc-name';
  nameEl.textContent = b.name || 'Sem nome';
  head.appendChild(nameEl);

  var dateEl = document.createElement('div');
  dateEl.className = 'bc-date';
  dateEl.textContent = dateStr + timeStr;
  head.appendChild(dateEl);

  var phoneEl = document.createElement('div');
  phoneEl.className = 'bc-phone';
  phoneEl.textContent = b.phone || '';
  head.appendChild(phoneEl);

  var arrow = document.createElement('div');
  arrow.className = 'bc-arrow';
  var arrSvg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  arrSvg.setAttribute('viewBox','0 0 24 24');
  var poly = document.createElementNS('http://www.w3.org/2000/svg','polyline');
  poly.setAttribute('points','6 9 12 15 18 9');
  arrSvg.appendChild(poly);
  arrow.appendChild(arrSvg);
  head.appendChild(arrow);

  head.addEventListener('click', function(){
    card.classList.toggle('open');
  });

  card.appendChild(head);

  /* BODY */
  var body = document.createElement('div');
  body.className = 'bc-body';

  /* Row 1: date, time, vehicle */
  var row1 = document.createElement('div');
  row1.className = 'bc-row';

  row1.appendChild(buildField('Data', 'date', b.date||'', 'date', b));
  row1.appendChild(buildField('Horario', 'time', b.time||'', 'time', b));
  row1.appendChild(buildField('Veiculo', 'vehicle', b.vehicle||'', 'text', b));
  body.appendChild(row1);

  /* Row 2: status, price */
  var row2 = document.createElement('div');
  row2.className = 'bc-row';

  var statusField = document.createElement('div');
  statusField.className = 'bc-field';
  var statusLabel = document.createElement('label');
  statusLabel.textContent = 'Status';
  var statusSel = document.createElement('select');
  statusSel.className = 'bc-input bc-select';
  statusSel.dataset.field = 'status';
  ['pendente','confirmado','cancelado'].forEach(function(val){
    var opt = document.createElement('option');
    opt.value = val;
    opt.textContent = val.charAt(0).toUpperCase() + val.slice(1);
    if(b.status===val) opt.selected = true;
    statusSel.appendChild(opt);
  });
  statusField.appendChild(statusLabel);
  statusField.appendChild(statusSel);
  row2.appendChild(statusField);

  row2.appendChild(buildField('Preco (R$)', 'price', b.price||'', 'text', b));
  body.appendChild(row2);

  /* Services chips */
  var svcsDiv = document.createElement('div');
  svcsDiv.className = 'bc-field';
  svcsDiv.style.width = '100%';
  var svcsLabel = document.createElement('label');
  svcsLabel.textContent = 'Servicos selecionados';
  var chips = document.createElement('div');
  chips.className = 'bc-services-chips';
  var svcs = Array.isArray(b.services) ? b.services : [];
  if(svcs.length === 0){
    var noChip = document.createElement('span');
    noChip.style.cssText = 'font-size:.78rem;color:var(--text3);font-style:italic';
    noChip.textContent = 'Nenhum servico selecionado';
    chips.appendChild(noChip);
  } else {
    svcs.forEach(function(s){
      var c = document.createElement('span');
      c.className = 'bc-chip';
      c.textContent = s;
      chips.appendChild(c);
    });
  }
  svcsDiv.appendChild(svcsLabel);
  svcsDiv.appendChild(chips);
  body.appendChild(svcsDiv);

  /* Services edit (select multiple) */
  var svcEditWrap = document.createElement('div');
  svcEditWrap.className = 'bc-field';
  svcEditWrap.style.cssText = 'width:100%;margin-top:8px';
  var svcEditLabel = document.createElement('label');
  svcEditLabel.textContent = 'Alterar servicos (Ctrl+click para multiplos)';
  var svcSelect = document.createElement('select');
  svcSelect.multiple = true;
  svcSelect.className = 'bc-input';
  svcSelect.style.height = '120px';
  svcSelect.dataset.field = 'services_multi';
  SVC_LIST.forEach(function(s){
    var opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    if(svcs.indexOf(s) !== -1) opt.selected = true;
    svcSelect.appendChild(opt);
  });
  svcEditWrap.appendChild(svcEditLabel);
  svcEditWrap.appendChild(svcSelect);
  body.appendChild(svcEditWrap);

  /* Observations / internal note */
  var row3 = document.createElement('div');
  row3.className = 'bc-row';
  row3.appendChild(buildTextarea('Observacoes do cliente', 'obs', b.obs||'', b));
  row3.appendChild(buildTextarea('Nota interna', 'note', b.note||'', b));
  body.appendChild(row3);

  /* ACTIONS */
  var actionsDiv = document.createElement('div');
  actionsDiv.className = 'bc-actions';

  var saveBtn = makeBtn('save', 'Salvar', iconSave());
  saveBtn.addEventListener('click', function(){ saveBooking(b.id, body, card); });
  actionsDiv.appendChild(saveBtn);

  var waBtn = makeBtn('wa', 'WhatsApp', iconWa());
  var phone = (b.phone||'').replace(/\D/g,'');
  if(phone.length >= 10 && phone.slice(0,2) !== '55') phone = '55' + phone;
  waBtn.addEventListener('click', function(){
    var msg = 'Ola ' + (b.name||'cliente') + '! Sua agenda no Red Studio Automotive esta confirmada para ' + dateStr + timeStr + '. Qualquer duvida estamos aqui!';
    window.open('https://wa.me/' + phone + '?text=' + encodeURIComponent(msg), '_blank');
  });
  actionsDiv.appendChild(waBtn);

  var confirmBtn = makeBtn('confirm', 'Confirmar', iconCheck());
  confirmBtn.addEventListener('click', function(){ quickUpdate(b.id, {status:'confirmado'}, card); });
  actionsDiv.appendChild(confirmBtn);

  var cancelBtn = makeBtn('cancel', 'Cancelar', iconX());
  cancelBtn.addEventListener('click', function(){ quickUpdate(b.id, {status:'cancelado'}, card); });
  actionsDiv.appendChild(cancelBtn);

  var delBtn = makeBtn('del', 'Excluir', iconTrash());
  delBtn.addEventListener('click', function(){ deleteBooking(b.id, card); });
  actionsDiv.appendChild(delBtn);

  body.appendChild(actionsDiv);

  /* Meta */
  var meta = document.createElement('div');
  meta.className = 'bc-meta';
  meta.textContent = 'ID: ' + b.id + ' | Criado: ' + (b.createdAt ? new Date(b.createdAt).toLocaleString('pt-BR') : '—') + (b.updatedAt ? ' | Atualizado: ' + new Date(b.updatedAt).toLocaleString('pt-BR') : '');
  body.appendChild(meta);

  card.appendChild(body);
  return card;
}

function buildField(labelText, fieldKey, value, type, b){
  var wrap = document.createElement('div');
  wrap.className = 'bc-field';
  var lbl = document.createElement('label');
  lbl.textContent = labelText;
  var inp = document.createElement('input');
  inp.type = type;
  inp.className = 'bc-input';
  inp.value = value;
  inp.dataset.field = fieldKey;
  wrap.appendChild(lbl);
  wrap.appendChild(inp);
  return wrap;
}

function buildTextarea(labelText, fieldKey, value, b){
  var wrap = document.createElement('div');
  wrap.className = 'bc-field';
  var lbl = document.createElement('label');
  lbl.textContent = labelText;
  var ta = document.createElement('textarea');
  ta.className = 'bc-input';
  ta.rows = 2;
  ta.value = value;
  ta.dataset.field = fieldKey;
  wrap.appendChild(lbl);
  wrap.appendChild(ta);
  return wrap;
}

function makeBtn(cls, label, iconEl){
  var btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'bc-btn ' + cls;
  if(iconEl) btn.appendChild(iconEl);
  btn.appendChild(document.createTextNode(' ' + label));
  return btn;
}

/* SAVE */
function saveBooking(id, bodyEl, card){
  var updates = {};
  bodyEl.querySelectorAll('[data-field]').forEach(function(el){
    var key = el.dataset.field;
    if(key === 'services_multi'){
      updates.services = Array.from(el.options).filter(function(o){ return o.selected; }).map(function(o){ return o.value; });
    } else {
      updates[key] = el.value;
    }
  });
  fetch('/api/bookings', {
    method: 'PUT',
    headers: {'Content-Type':'application/json','x-admin-token':adminToken},
    body: JSON.stringify(Object.assign({id:id}, updates))
  }).then(function(r){ return r.json(); }).then(function(data){
    if(data.error) throw new Error(data.error);
    var idx = allBookings.findIndex(function(b){ return b.id===id; });
    if(idx !== -1) allBookings[idx] = data;
    renderAll();
    toast('Agendamento salvo!','ok');
  }).catch(function(){ toast('Erro ao salvar.','err'); });
}

function quickUpdate(id, updates, card){
  fetch('/api/bookings', {
    method: 'PUT',
    headers: {'Content-Type':'application/json','x-admin-token':adminToken},
    body: JSON.stringify(Object.assign({id:id}, updates))
  }).then(function(r){ return r.json(); }).then(function(data){
    if(data.error) throw new Error(data.error);
    var idx = allBookings.findIndex(function(b){ return b.id===id; });
    if(idx !== -1) allBookings[idx] = data;
    renderAll();
    toast('Status atualizado!','ok');
  }).catch(function(){ toast('Erro ao atualizar.','err'); });
}

function deleteBooking(id, card){
  if(!window.confirm('Excluir este agendamento permanentemente?')) return;
  fetch('/api/bookings?id=' + encodeURIComponent(id), {
    method: 'DELETE',
    headers: {'x-admin-token': adminToken}
  }).then(function(r){ return r.json(); }).then(function(data){
    if(data.error) throw new Error(data.error);
    allBookings = allBookings.filter(function(b){ return b.id !== id; });
    renderAll();
    toast('Agendamento excluido.','ok');
  }).catch(function(){ toast('Erro ao excluir.','err'); });
}
